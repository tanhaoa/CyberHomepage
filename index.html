<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Cyber Homepage - Sci-fi themed personal dashboard" />
  <meta name="theme-color" content="#06060f" />
  <title>Cyber Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="grid-pulse"></div>

  <!-- Top Bar -->
  <header class="top-bar" id="topBar">
    <div class="top-bar-left">
      <span class="status-dot online"></span>
      <span class="terminal-text" id="ipInfo" data-i18n="locating">LOCATING...</span>
    </div>
    <div class="top-bar-center">
      <span class="terminal-text" data-i18n="systemOnline">SYSTEM ONLINE</span>
    </div>
    <div class="top-bar-right">
      <span class="terminal-text" id="weatherInfo" data-i18n="loading">LOADING...</span>
      <button class="top-btn" id="settingsToggle" title="" aria-label="" data-i18n-title="settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="top-btn focus-toggle" id="focusToggle" title="" aria-label="" data-i18n-title="focusMode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <section class="clock-section">
      <div class="greeting" id="greeting"></div>
      <div class="clock-wrapper">
        <div class="clock" id="clock">00:00:00</div>
        <div class="clock-glow"></div>
      </div>
      <div class="date-display" id="dateDisplay"></div>
    </section>

    <section class="search-section">
      <div class="search-container">
        <div class="search-engine-tabs">
          <button class="engine-tab active" data-engine="google">Google</button>
          <button class="engine-tab" data-engine="bing">Bing</button>
          <button class="engine-tab" data-engine="baidu">百度</button>
          <button class="engine-tab" data-engine="duckduckgo">DuckDuckGo</button>
        </div>
        <div class="search-bar">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="" autocomplete="off" />
          <kbd class="search-hint">/</kbd>
        </div>
      </div>
    </section>

    <section class="card-grid">
      <!-- Quick Links -->
      <div class="glass-card quick-links-card">
        <div class="card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span data-i18n="quickAccess">QUICK ACCESS</span>
        </div>
        <div class="links-grid" id="linksGrid"></div>
      </div>

      <!-- System Info Terminal -->
      <div class="glass-card terminal-card">
        <div class="card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span data-i18n="systemTerminal">SYSTEM TERMINAL</span>
          <span class="terminal-blink">_</span>
        </div>
        <div class="terminal-body" id="terminalBody"></div>
      </div>

      <!-- Daily Quote -->
      <div class="glass-card quote-card">
        <div class="card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/></svg>
          <span data-i18n="dailyQuote">DAILY TRANSMISSION</span>
        </div>
        <div class="quote-body">
          <blockquote class="quote-text" id="quoteText"></blockquote>
          <div class="quote-author" id="quoteAuthor"></div>
        </div>
      </div>

      <!-- Quick Notes -->
      <div class="glass-card notes-card">
        <div class="card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span data-i18n="quickNotes">QUICK NOTES</span>
          <span class="note-count" id="noteCount">0</span>
        </div>
        <div class="notes-body">
          <textarea id="noteInput" data-i18n-placeholder="notePlaceholder" placeholder="" rows="3"></textarea>
          <button class="note-save-btn" id="noteSaveBtn" data-i18n="save">SAVE</button>
          <div class="notes-list" id="notesList"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Focus Mode -->
  <div class="focus-overlay" id="focusOverlay">
    <div class="focus-clock" id="focusClock">00:00</div>
    <div class="focus-date" id="focusDate"></div>
    <div class="focus-hint" data-i18n-html="focusHint">Press <kbd>Esc</kbd> to exit</div>
  </div>

  <!-- Settings Modal -->
  <div class="settings-backdrop" id="settingsBackdrop">
    <div class="settings-modal" id="settingsModal">
      <div class="settings-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="settingsTitle">SYSTEM SETTINGS</span>
        <button class="settings-close" id="settingsClose">&times;</button>
      </div>

      <div class="settings-body">
        <!-- 语言 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelLang">语言 / LANGUAGE</label>
          <div class="setting-row">
            <button class="toggle-group" id="langToggle">
              <span class="toggle-option active" data-value="zh">中文</span>
              <span class="toggle-option" data-value="en">English</span>
            </button>
          </div>
        </div>

        <!-- 主题色 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelAccent">主题色 / ACCENT COLOR</label>
          <div class="setting-row">
            <div class="color-presets" id="accentPresets">
              <button class="color-preset active" data-color="#00e5ff" style="background:#00e5ff"></button>
              <button class="color-preset" data-color="#a855f7" style="background:#a855f7"></button>
              <button class="color-preset" data-color="#f97316" style="background:#f97316"></button>
              <button class="color-preset" data-color="#10b981" style="background:#10b981"></button>
              <button class="color-preset" data-color="#f43f5e" style="background:#f43f5e"></button>
              <button class="color-preset" data-color="#eab308" style="background:#eab308"></button>
            </div>
            <input type="color" class="color-picker" id="accentPicker" value="#00e5ff" />
          </div>
        </div>

        <!-- 粒子颜色 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelParticle">粒子颜色 / PARTICLE COLOR</label>
          <div class="setting-row">
            <div class="color-presets" id="particlePresets">
              <button class="color-preset active" data-color="0,229,255" style="background:#00e5ff"></button>
              <button class="color-preset" data-color="139,92,246" style="background:#8b5cf6"></button>
              <button class="color-preset" data-color="16,185,129" style="background:#10b981"></button>
              <button class="color-preset" data-color="249,115,22" style="background:#f97316"></button>
              <button class="color-preset" data-color="255,255,255" style="background:#ffffff"></button>
            </div>
          </div>
        </div>

        <!-- 时钟格式 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelClock">时钟格式 / CLOCK FORMAT</label>
          <div class="setting-row">
            <button class="toggle-group" id="clockFormatToggle">
              <span class="toggle-option active" data-value="24">24H</span>
              <span class="toggle-option" data-value="12">12H</span>
            </button>
          </div>
        </div>

        <!-- 默认搜索引擎 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelEngine">默认搜索引擎 / DEFAULT ENGINE</label>
          <div class="setting-row">
            <select class="setting-select" id="defaultEngine">
              <option value="google">Google</option>
              <option value="bing">Bing</option>
              <option value="baidu">百度</option>
              <option value="duckduckgo">DuckDuckGo</option>
            </select>
          </div>
        </div>

        <!-- 问候语 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelGreeting">自定义问候语 / CUSTOM GREETING</label>
          <div class="setting-row">
            <input type="text" class="setting-input" id="customGreeting" data-i18n-placeholder="phGreeting" placeholder="" />
          </div>
        </div>

        <!-- 页面标题 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelTitle">页面标题 / PAGE TITLE</label>
          <div class="setting-row">
            <input type="text" class="setting-input" id="pageTitle" placeholder="Cyber Homepage" />
          </div>
        </div>

        <!-- 搜索框占位符 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelSearchPh">搜索框提示 / SEARCH PLACEHOLDER</label>
          <div class="setting-row">
            <input type="text" class="setting-input" id="searchPlaceholder" data-i18n-placeholder="phSearchSetting" placeholder="" />
          </div>
        </div>

        <!-- 粒子密度 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelDensity">粒子密度 / PARTICLE DENSITY</label>
          <div class="setting-row">
            <input type="range" class="setting-range" id="particleDensity" min="20" max="100" value="100" />
            <span class="range-value" id="particleDensityVal">100%</span>
          </div>
        </div>

        <!-- 快捷链接管理 -->
        <div class="setting-group">
          <label class="setting-label" data-i18n="labelLinks">快捷链接管理 / QUICK LINKS</label>
          <div class="links-editor" id="linksEditor">
            <div class="link-edit-list" id="linkEditList"></div>
            <div class="link-edit-add">
              <input type="text" class="setting-input" id="newLinkName" data-i18n-placeholder="phLinkName" placeholder="" />
              <input type="text" class="setting-input" id="newLinkUrl" placeholder="URL (https://...)" />
              <input type="text" class="setting-input" id="newLinkIcon" data-i18n-placeholder="phLinkIcon" placeholder="" style="max-width:80px" />
              <button class="link-add-btn" id="addLinkBtn">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="settings-footer">
        <button class="settings-btn reset-btn" id="resetSettings" data-i18n="resetAll">RESET ALL</button>
        <button class="settings-btn save-btn" id="saveSettings" data-i18n="saveApply">SAVE & APPLY</button>
      </div>
    </div>
  </div>

  <!-- Bottom Data Stream -->
  <footer class="data-stream" id="dataStream">
    <div class="stream-content" id="streamContent"></div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
